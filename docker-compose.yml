# using docker-compose version 3.9
version: '3.9'

services:
  app:
    # build the application image from the Dockerfile in the root directory
    build: .
    # map port 3000 of the container to port 3000 on the host ( so you can access the app at http://localhost:3000 )
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  db:
    # use the official MySQL image from Docker Hub
    image: mysql:8.0
    # set environment variables for MySQL configuration
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    # mount a volume to persist MySQL data
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
